<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>iWorkout</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme:light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme:dark)">
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --bg: #F2F2F7;
            --txt: #000;
            --muted: #8E8E93;
            --accent: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --card: rgba(255,255,255,0.82);
            --border: rgba(255,255,255,0.45);
            --shadow: 0 4px 16px rgba(0,0,0,0.04);
            --input: rgba(118,118,128,0.12);
        }
        [data-theme="dark"] {
            --bg: #000;
            --txt: #fff;
            --muted: #EBEBF5;
            --accent: #0A84FF;
            --success: #30D158;
            --danger: #FF453A;
            --card: rgba(28,28,30,0.78);
            --border: rgba(255,255,255,0.08);
            --shadow: 0 4px 16px rgba(0,0,0,0.3);
            --input: rgba(118,118,128,0.24);
        }
        * { box-sizing:border-box;-webkit-tap-highlight-color:transparent; }
        body {
            font-family: -apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Helvetica,sans-serif;
            background: var(--bg);
            color: var(--txt);
            margin: 0;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            transition: background .35s;
        }
        .glass {
            background: var(--card);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .header {
            padding: 14px 20px 8px;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.6px;
            flex-shrink: 0;
        }
        .segmented-control {
            display: flex;
            background: var(--input);
            margin: 0 20px 8px;
            border-radius: 9px;
            padding: 2px;
            flex-shrink: 0;
        }
        .segment {
            flex: 1;
            text-align: center;
            padding: 6px 0;
            font-size: 13px;
            font-weight: 600;
            border-radius: 7px;
            cursor: pointer;
            transition: .2s;
        }
        .segment.active {
            background: var(--card);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .days-scroll {
            display: flex;
            overflow-x: auto;
            padding: 0 20px 8px;
            gap: 8px;
            flex-shrink: 0;
            scrollbar-width: none;
        }
        .days-scroll::-webkit-scrollbar { display:none; }
        .day-pill {
            padding: 7px 16px;
            border-radius: 18px;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            color: var(--muted);
            cursor: pointer;
            transition: .25s;
        }
        .day-pill.active { background: var(--txt); color: var(--bg); }
        .day-pill.completed { background: rgba(52,199,89,0.15); color: var(--success); border:1px solid rgba(52,199,89,0.25); }
        .day-pill.completed.active { background: var(--success); color:#fff; border-color:var(--success); }
        [data-theme="dark"] .day-pill.completed { background: rgba(48,209,88,0.15); }

        .container {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 10px;
            display: flex;
            flex-direction: column;
        }
        .card { border-radius: 16px; padding: 14px; margin-bottom: 12px; }
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.3px; }
        .sets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(68px,1fr)); gap: 10px; }
        .set-btn {
            aspect-ratio: 1;
            border-radius: 14px;
            background: var(--input);
            border: none;
            color: var(--txt);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: .2s cubic-bezier(.175,.885,.32,1.275);
            padding: 4px;
        }
        .set-btn:active { transform: scale(.92); }
        .set-btn.done { background: var(--success); color:#fff; box-shadow:0 4px 12px rgba(52,199,89,0.4); }
        .set-reps { font-size: 20px; font-weight: 700; line-height: 1; }
        .set-weight { font-size: 10px; font-weight: 500; opacity: .8; }

        input, textarea {
            background: var(--input);
            color: var(--txt);
            border: none;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            font-weight: 500;
            width: 100%;
            outline: none;
            transition: .2s;
            user-select: text;
            -webkit-user-select: text;
        }
        input:focus { box-shadow: 0 0 0 2px var(--accent); }

        .setup-row {
            display: grid;
            grid-template-columns: 32px 1fr 1fr 1fr 28px;
            gap: 6px;
            align-items: center;
            margin-bottom: 6px;
            background: rgba(118,118,128,0.04);
            padding: 6px;
            border-radius: 10px;
        }
        .setup-row-labels {
            display: grid;
            grid-template-columns: 32px 1fr 1fr 1fr 28px;
            gap: 6px;
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            font-weight: 700;
            padding: 0 6px 2px;
            text-align: center;
        }
        .set-num { font-weight: 700; font-size: 13px; color: var(--muted); text-align: center; }

        .btn {
            width: 100%;
            padding: 13px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: .2s;
            margin-bottom: 10px;
        }
        .btn:active { transform: scale(.97); opacity: .8; }
        .btn-primary { background: var(--accent); color:#fff; }
        .btn-success { background: var(--success); color:#fff; }
        .btn-danger { background: rgba(255,59,48,0.1); color: var(--danger); }
        .btn-secondary { background: var(--input); color: var(--txt); }
        .btn-small { padding: 8px; font-size: 13px; border-radius: 10px; }

        .timer-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 20px 30px;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            transform: translateY(110%);
            transition: transform .45s cubic-bezier(.175,.885,.32,1.275);
            z-index: 100;
            text-align: center;
        }
        .timer-panel.active { transform: translateY(0); }
        .timer-title { color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .timer-time { font-size: 48px; font-weight: 800; font-variant-numeric: tabular-nums; margin: 2px 0 12px; }

        .hidden { display: none !important; }
        .icon-btn {
            background: none; border: none; color: var(--danger);
            cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:active { opacity: .5; }
        .icon-btn-accent { color: var(--accent); font-size: 14px; font-weight: 600; }
        .empty-state { text-align: center; padding: 30px 20px; color: var(--muted); }
        .empty-icon { font-size: 40px; margin-bottom: 10px; }
        .footer-actions { margin-top: auto; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="header" id="main-title">Тренировка</div>
    <div class="segmented-control">
        <div class="segment active" onclick="switchTab('workout',this)">Тренировка</div>
        <div class="segment" onclick="switchTab('setup',this)">Программа</div>
        <div class="segment" onclick="switchTab('settings',this)">Профиль</div>
    </div>
    <div class="days-scroll" id="days-nav"></div>
    <div class="container">
        <div id="view-workout" style="display:flex;flex-direction:column;flex:1;">
            <div id="workout-list" style="flex:1;"></div>
        </div>
        <div id="view-setup" class="hidden" style="display:flex;flex-direction:column;flex:1;">
            <div id="setup-header" style="display:flex;justify-content:space-between;margin-bottom:12px;"></div>
            <div id="setup-name-container" style="margin-bottom:12px;">
                <input type="text" id="day-name-input" placeholder="Название дня" style="font-size:22px;font-weight:700;background:transparent;padding:0;" onchange="updateDayName(this.value)">
            </div>
            <div id="setup-list" style="flex:1;overflow-y:auto;"></div>
            <button id="btn-add-ex" class="btn btn-secondary" onclick="addExercise()">+ Упражнение</button>
            <button id="btn-delete-day" class="btn btn-danger hidden" style="margin-top:8px;" onclick="deleteCurrentDay()">Удалить день</button>
        </div>
        <div id="view-settings" class="hidden">
            <div class="card glass" style="display:flex;justify-content:space-between;align-items:center;">
                <strong style="font-size:17px;">Темная тема</strong>
                <input type="checkbox" id="theme-toggle" onchange="toggleTheme()" style="width:24px;height:24px;accent-color:var(--accent);">
            </div>
            <div class="card glass">
                <h3 style="margin:0 0 8px;font-size:17px;color:var(--danger);">Сброс</h3>
                <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">Удаляет всё, возвращая приложение к начальному состоянию.</p>
                <button class="btn btn-danger" onclick="hardReset()">Сбросить всё</button>
            </div>
        </div>
    </div>
    <div class="timer-panel glass" id="timer-panel">
        <div class="timer-title">Отдых</div>
        <div class="timer-time" id="timer-display">00:00</div>
        <button class="btn btn-secondary" style="background:var(--input);" onclick="stopTimer()">Пропустить</button>
    </div>
    <template id="icon-trash">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path></svg>
    </template>
    <script>
        const STORAGE_KEY='iWorkout_App';
        let db=JSON.parse(localStorage.getItem(STORAGE_KEY))||{theme:'light',currentDayId:0,progress:{},completedDays:{},days:[]};
        db.completedDays=db.completedDays||{};
        let activeTab='workout',timerInterval;
        const trashIcon=document.getElementById('icon-trash').innerHTML;
        function playBeep(){
            try{
                const ctx=new(window.AudioContext||window.webkitAudioContext)();
                for(let i=0;i<3;i++){
                    const o=ctx.createOscillator(),g=ctx.createGain();
                    o.type='sine';o.frequency.setValueAtTime(880,ctx.currentTime+i);
                    g.gain.setValueAtTime(0.2,ctx.currentTime+i);g.gain.exponentialRampToValueAtTime(0.00001,ctx.currentTime+i+0.8);
                    o.connect(g);g.connect(ctx.destination);o.start(ctx.currentTime+i);o.stop(ctx.currentTime+i+0.8);
                }
            }catch(e){}
        }
        function init(){
            if(db.theme==='dark'){document.body.setAttribute('data-theme','dark');document.getElementById('theme-toggle').checked=true;}
            renderDaysNav();renderView();
        }
        function saveDB(){localStorage.setItem(STORAGE_KEY,JSON.stringify(db));}
        function switchTab(tab,el){
            activeTab=tab;document.querySelectorAll('.segment').forEach(s=>s.classList.remove('active'));
            if(el)el.classList.add('active');
            ['workout','setup','settings'].forEach(t=>document.getElementById(`view-${t}`).classList.add('hidden'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            const titles={workout:'Тренировка',setup:'Программа',settings:'Настройки'};
            document.getElementById('main-title').innerText=titles[tab];
            renderView();
        }
        function selectDay(i){db.currentDayId=i;saveDB();renderDaysNav();renderView();}
        function renderDaysNav(){
            const nav=document.getElementById('days-nav');
            if(db.days.length===0){nav.innerHTML='';return;}
            nav.innerHTML=db.days.map((d,i)=>`<div class="day-pill glass ${i===db.currentDayId?'active':''} ${db.completedDays[i]?'completed':''}" onclick="selectDay(${i})">${d.name}${db.completedDays[i]?' ✓':''}</div>`).join('');
        }
        function renderView(){if(activeTab==='workout')renderWorkout();if(activeTab==='setup')renderSetup();}
        function renderWorkout(){
            const list=document.getElementById('workout-list');
            const day=db.days[db.currentDayId];
            if(!day||!day.exercises||day.exercises.length===0){
                list.innerHTML=`<div class="empty-state glass" style="border-radius:16px;margin-top:10px;"><div class="empty-icon">👋</div><h3>Начни тренировку</h3><p style="font-size:14px;">Создай программу во вкладке «Программа».</p></div>`;
                return;
            }
            let html=day.exercises.map((ex,ei)=>`<div class="card glass"><div class="card-title">${ex.name||'Без названия'}</div><div class="sets-grid">${ex.sets.map((s,si)=>{const d=db.progress[`${db.currentDayId}_${ei}_${si}`];return`<button class="set-btn ${d?'done':''}" onclick="toggleSet(${ei},${si},${s.rest})"><span class="set-reps">${s.reps}</span>${s.weight>0?`<span class="set-weight">${s.weight}кг</span>`:`<span class="set-weight">раз</span>`}</button>`;}).join('')}</div></div>`).join('');
            html+=`<div class="footer-actions"><button class="btn btn-success glass" style="border:none;" onclick="finishWorkout()">${db.completedDays[db.currentDayId]?'Следующий день →':'Завершить день ✓'}</button><button class="btn btn-secondary glass" style="border:none;" onclick="restartDay()">↺ Начать заново</button></div>`;
            list.innerHTML=html;
        }
        function toggleSet(ei,si,rest){const k=`${db.currentDayId}_${ei}_${si}`;if(db.progress[k]){delete db.progress[k];}else{db.progress[k]=true;if(rest>0)startTimer(rest);}saveDB();renderWorkout();}
        function finishWorkout(){db.completedDays[db.currentDayId]=true;if(db.days.length>1)db.currentDayId=(db.currentDayId+1)%db.days.length;saveDB();renderDaysNav();renderWorkout();}
        function restartDay(){if(confirm('Сбросить прогресс этого дня?')){db.completedDays[db.currentDayId]=false;Object.keys(db.progress).forEach(k=>{if(k.startsWith(db.currentDayId+'_'))delete db.progress[k];});saveDB();renderDaysNav();renderWorkout();}}
        function renderSetup(){
            const list=document.getElementById('setup-list'),day=db.days[db.currentDayId];
            const nameInput=document.getElementById('day-name-input'),header=document.getElementById('setup-header');
            const nameContainer=document.getElementById('setup-name-container'),btnAdd=document.getElementById('btn-add-ex'),btnDel=document.getElementById('btn-delete-day');
            if(!day){
                list.innerHTML=`<div class="empty-state"><div class="empty-icon">📝</div><h3>Создай программу</h3><p>Нажми «+ Новый день»</p></div>`;
                header.innerHTML=`<button class="btn btn-primary" onclick="addDay()">+ Новый день</button>`;
                nameContainer.classList.add('hidden');btnAdd.classList.add('hidden');btnDel.classList.add('hidden');return;
            }
            header.innerHTML=`<button class="icon-btn icon-btn-accent" onclick="copyDay()">Копировать</button><button class="icon-btn icon-btn-accent" onclick="addDay()">+ День</button>`;
            nameContainer.classList.remove('hidden');btnAdd.classList.remove('hidden');btnDel.classList.remove('hidden');
            nameInput.value=day.name;
            list.innerHTML=day.exercises.map((ex,ei)=>`<div class="card glass"><div style="display:flex;gap:8px;margin-bottom:10px;"><input value="${ex.name}" onchange="updateExName(${ei},this.value)" placeholder="Название" style="font-weight:700;font-size:16px;"><button class="icon-btn" onclick="deleteExercise(${ei})">${trashIcon}</button></div><div class="setup-row-labels"><div>№</div><div>Повт</div><div>Вес</div><div>Мин</div><div></div></div>${ex.sets.map((s,si)=>`<div class="setup-row"><div class="set-num">${si+1}</div><input value="${s.reps}" onchange="updateSet(${ei},${si},'reps',this.value)" style="text-align:center;"><input type="number" inputmode="decimal" value="${s.weight}" onchange="updateSet(${ei},${si},'weight',this.value)" style="text-align:center;"><input type="number" step="0.5" inputmode="decimal" value="${s.rest}" onchange="updateSet(${ei},${si},'rest',this.value)" style="text-align:center;"><button class="icon-btn" onclick="deleteSet(${ei},${si})">${trashIcon}</button></div>`).join('')}<button class="btn btn-secondary btn-small" style="margin-top:8px;" onclick="addSet(${ei})">+ Подход</button></div>`).join('');
        }
        function updateDayName(v){db.days[db.currentDayId].name=v||'Без названия';saveDB();renderDaysNav();}
        function updateExName(ei,v){db.days[db.currentDayId].exercises[ei].name=v;saveDB();}
        function updateSet(ei,si,f,v){db.days[db.currentDayId].exercises[ei].sets[si][f]=f==='reps'?v:(parseFloat(v)||0);saveDB();}
        function addExercise(){db.days[db.currentDayId].exercises.push({name:'',sets:[{reps:'15',weight:0,rest:1}]});saveDB();renderSetup();}
        function deleteExercise(ei){if(confirm('Удалить упражнение?')){db.days[db.currentDayId].exercises.splice(ei,1);saveDB();renderSetup();}}
        function addSet(ei){const ex=db.days[db.currentDayId].exercises[ei];const last=ex.sets.length>0?{...ex.sets[ex.sets.length-1]}:{reps:'10',weight:0,rest:1};ex.sets.push(last);saveDB();renderSetup();}
        function deleteSet(ei,si){db.days[db.currentDayId].exercises[ei].sets.splice(si,1);saveDB();renderSetup();}
        function addDay(){db.days.push({name:`День ${db.days.length+1}`,exercises:[]});db.currentDayId=db.days.length-1;saveDB();renderDaysNav();renderSetup();}
        function deleteCurrentDay(){if(confirm('Удалить этот день?')){db.days.splice(db.currentDayId,1);delete db.completedDays[db.currentDayId];db.currentDayId=db.days.length>0?0:0;saveDB();renderDaysNav();renderSetup();}}
        function copyDay(){if(!db.days.length)return;const c=JSON.parse(JSON.stringify(db.days[db.currentDayId]));c.name+=' (Копия)';db.days.push(c);db.currentDayId=db.days.length-1;saveDB();renderDaysNav();renderSetup();}
        function startTimer(m){stopTimer();let t=Math.round(m*60);const p=document.getElementById('timer-panel'),d=document.getElementById('timer-display');p.classList.add('active');const u=()=>{const min=Math.floor(t/60),s=t%60;d.innerText=`${min<10?'0':''}${min}:${s<10?'0':''}${s}`;};u();timerInterval=setInterval(()=>{t--;if(t<=0){stopTimer();playBeep();if(navigator.vibrate)navigator.vibrate([400,600,400,600,400]);}else u();},1000);}
        function stopTimer(){clearInterval(timerInterval);document.getElementById('timer-panel').classList.remove('active');}
        function toggleTheme(){const is=document.getElementById('theme-toggle').checked;db.theme=is?'dark':'light';document.body.setAttribute('data-theme',is?'dark':'');saveDB();}
        function hardReset(){if(confirm('Точно сбросить всё?')){localStorage.removeItem(STORAGE_KEY);location.reload();}}
        init();
    </script>
</body>
</html>
