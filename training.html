<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>iWorkout</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme:light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme:dark)">
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --bg: #F2F2F7;
            --txt: #000;
            --muted: #8E8E93;
            --accent: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --card: rgba(255,255,255,0.82);
            --border: rgba(255,255,255,0.45);
            --shadow: 0 4px 16px rgba(0,0,0,0.04);
            --input: rgba(118,118,128,0.12);
            --nav-height: 44px;
            --header-height: 50px;
            --days-height: 36px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        [data-theme="dark"] {
            --bg: #000;
            --txt: #fff;
            --muted: #EBEBF5;
            --accent: #0A84FF;
            --success: #30D158;
            --danger: #FF453A;
            --card: rgba(28,28,30,0.78);
            --border: rgba(255,255,255,0.08);
            --shadow: 0 4px 16px rgba(0,0,0,0.3);
            --input: rgba(118,118,128,0.24);
        }
        * { box-sizing:border-box;-webkit-tap-highlight-color:transparent; }
        body {
            font-family: -apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Helvetica,sans-serif;
            background: var(--bg);
            color: var(--txt);
            margin: 0;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            transition: background .35s;
        }
        .header {
            height: var(--header-height);
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            flex-shrink: 0;
        }
        .segmented-control {
            display: flex;
            background: var(--input);
            margin: 0 20px 6px;
            border-radius: 9px;
            padding: 2px;
            flex-shrink: 0;
        }
        .segment {
            flex: 1;
            text-align: center;
            padding: 7px 0;
            font-size: 13px;
            font-weight: 600;
            border-radius: 7px;
            cursor: pointer;
            transition: .2s;
        }
        .segment.active {
            background: var(--card);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .days-scroll {
            display: flex;
            overflow-x: auto;
            padding: 0 20px 4px;
            gap: 8px;
            flex-shrink: 0;
            height: var(--days-height);
            align-items: center;
            scrollbar-width: none;
        }
        .days-scroll::-webkit-scrollbar { display:none; }
        .day-pill {
            padding: 5px 14px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            color: var(--muted);
            cursor: pointer;
            transition: .25s;
            background: var(--input);
        }
        .day-pill.active { background: var(--txt); color: var(--bg); }
        .day-pill.completed { background: rgba(52,199,89,0.15); color: var(--success); border:1px solid rgba(52,199,89,0.25); }
        .day-pill.completed.active { background: var(--success); color:#fff; border-color:var(--success); }
        [data-theme="dark"] .day-pill.completed { background: rgba(48,209,88,0.15); }
        .container {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 8px;
            display: flex;
            flex-direction: column;
        }
        .card { border-radius: 16px; padding: 12px; margin-bottom: 10px; background: var(--card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border:1px solid var(--border); box-shadow: var(--shadow); }
        .card-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card-title { font-size: 17px; font-weight: 700; margin:0; letter-spacing: -0.3px; }
        .card-arrow { font-size: 20px; transition: transform .2s; color: var(--muted); }
        .card.open .card-arrow { transform: rotate(180deg); }
        .card-body { max-height: 0; overflow: hidden; transition: max-height .3s cubic-bezier(.4,0,.2,1); }
        .card.open .card-body { max-height: 600px; }
        .sets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px,1fr)); gap: 8px; margin-top: 8px; }
        .set-btn {
            aspect-ratio: 1;
            border-radius: 13px;
            background: var(--input);
            border: none;
            color: var(--txt);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: .2s cubic-bezier(.175,.885,.32,1.275);
            padding: 2px;
            position: relative;
        }
        .set-btn:active { transform: scale(.92); }
        .set-btn.done { background: var(--success); color:#fff; box-shadow:0 4px 12px rgba(52,199,89,0.4); }
        .set-reps { font-size: 20px; font-weight: 700; }
        .set-weight { font-size: 10px; font-weight: 500; opacity: .8; }
        .check-mark { position: absolute; top:2px; right:4px; font-size: 12px; }
        input, textarea {
            background: var(--input);
            color: var(--txt);
            border: none;
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            font-weight: 500;
            width: 100%;
            outline: none;
            transition: .2s;
            user-select: text;
            -webkit-user-select: text;
        }
        input:focus { box-shadow: 0 0 0 2px var(--accent); }
        .setup-row {
            display: grid;
            grid-template-columns: 28px 1fr 1fr 1fr 28px;
            gap: 4px;
            align-items: center;
            margin-bottom: 4px;
            background: rgba(118,118,128,0.04);
            padding: 4px;
            border-radius: 8px;
        }
        .setup-row-labels {
            display: grid;
            grid-template-columns: 28px 1fr 1fr 1fr 28px;
            gap: 4px;
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
            font-weight: 700;
            padding: 0 4px 2px;
            text-align: center;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: .2s;
            margin-bottom: 8px;
        }
        .btn:active { transform: scale(.97); opacity: .8; }
        .btn-primary { background: var(--accent); color:#fff; }
        .btn-success { background: var(--success); color:#fff; }
        .btn-danger { background: rgba(255,59,48,0.1); color: var(--danger); }
        .btn-secondary { background: var(--input); color: var(--txt); }
        .btn-small { padding: 6px; font-size: 12px; border-radius: 8px; width: auto; display: inline-block; }
        .footer-actions { margin-top: auto; padding-top: 8px; }
        .timer-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 20px calc(12px + var(--safe-bottom));
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            transform: translateY(110%);
            transition: transform .4s cubic-bezier(.175,.885,.32,1.275);
            z-index: 100;
            text-align: center;
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .timer-panel.active { transform: translateY(0); }
        .timer-controls { display: flex; gap: 8px; margin-top: 6px; }
        .timer-controls button { flex:1; }
        .hidden { display: none !important; }
        .icon-btn { background: none; border: none; color: var(--danger); cursor: pointer; padding: 2px; display: flex; align-items: center; justify-content: center; }
        .icon-btn:active { opacity: .5; }
        .icon-btn-accent { color: var(--accent); font-size: 13px; font-weight: 600; }
        .empty-state { text-align: center; padding: 20px; color: var(--muted); }
    </style>
</head>
<body>
    <div class="header" id="main-title">iWorkout</div>
    <div class="segmented-control">
        <div class="segment active" onclick="switchTab('workout',this)">Тренировка</div>
        <div class="segment" onclick="switchTab('setup',this)">Программа</div>
        <div class="segment" onclick="switchTab('settings',this)">Настройки</div>
    </div>
    <div class="days-scroll" id="days-nav"></div>
    <div class="container" id="main-container">
        <div id="view-workout"></div>
        <div id="view-setup" class="hidden"></div>
        <div id="view-settings" class="hidden"></div>
    </div>
    <div class="timer-panel" id="timer-panel">
        <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">Отдых</div>
        <div style="font-size:42px;font-weight:800;margin:2px 0;" id="timer-display">00:00</div>
        <div class="timer-controls">
            <button class="btn btn-secondary btn-small" onclick="adjustTimer(-30)">-30</button>
            <button class="btn btn-secondary btn-small" onclick="stopTimer()">Стоп</button>
            <button class="btn btn-secondary btn-small" onclick="adjustTimer(30)">+30</button>
        </div>
    </div>
    <template id="icon-trash">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path></svg>
    </template>
    <script>
        const STORAGE_KEY='iWorkout_App';
        let db=JSON.parse(localStorage.getItem(STORAGE_KEY))||{
            theme:'light',currentDayId:0,progress:{},completedDays:{},days:[],
            settings:{defaultReps:'12',defaultWeight:0,defaultRest:1},
            history:[], expanded:{}
        };
        db.completedDays=db.completedDays||{};
        db.settings=db.settings||{defaultReps:'12',defaultWeight:0,defaultRest:1};
        db.history=db.history||[];
        db.expanded=db.expanded||{};
        let activeTab='workout',timerInterval,timerSeconds=0;
        const trashIcon=document.getElementById('icon-trash').innerHTML;
        function playBeep(){
            try{
                const ctx=new(window.AudioContext||window.webkitAudioContext)();
                for(let i=0;i<3;i++){
                    const o=ctx.createOscillator(),g=ctx.createGain();
                    o.type='sine';o.frequency.setValueAtTime(880,ctx.currentTime+i);
                    g.gain.setValueAtTime(0.2,ctx.currentTime+i);g.gain.exponentialRampToValueAtTime(0.00001,ctx.currentTime+i+0.8);
                    o.connect(g);g.connect(ctx.destination);o.start(ctx.currentTime+i);o.stop(ctx.currentTime+i+0.8);
                }
            }catch(e){}
        }
        function init(){
            if(db.theme==='dark'){document.body.setAttribute('data-theme','dark');document.getElementById('theme-toggle')?.setAttribute('checked','');}
            if(!db.days.length) db.days.push({name:'День 1',exercises:[]});
            renderAll();
        }
        function saveDB(){localStorage.setItem(STORAGE_KEY,JSON.stringify(db));}
        function switchTab(tab,el){
            activeTab=tab;document.querySelectorAll('.segment').forEach(s=>s.classList.remove('active'));
            if(el)el.classList.add('active');
            ['workout','setup','settings'].forEach(t=>document.getElementById(`view-${t}`).classList.add('hidden'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById('main-title').innerText=tab==='workout'?'Тренировка':(tab==='setup'?'Программа':'Настройки');
            renderView();
        }
        function selectDay(i){db.currentDayId=i;saveDB();renderAll();}
        function renderAll(){renderDaysNav();renderView();}
        function renderDaysNav(){
            const nav=document.getElementById('days-nav');
            if(db.days.length===0){nav.innerHTML='';return;}
            nav.innerHTML=db.days.map((d,i)=>`<div class="day-pill ${i===db.currentDayId?'active':''} ${db.completedDays[i]?'completed':''}" onclick="selectDay(${i})">${d.name}${db.completedDays[i]?' ✓':''}</div>`).join('');
        }
        function renderView(){
            if(activeTab==='workout')renderWorkout();
            else if(activeTab==='setup')renderSetup();
            else if(activeTab==='settings')renderSettings();
        }
        function renderWorkout(){
            const view=document.getElementById('view-workout');
            const day=db.days[db.currentDayId];
            if(!day||!day.exercises.length){
                view.innerHTML=`<div class="empty-state"><p>Нет упражнений. Создайте во вкладке Программа.</p></div>`;
                return;
            }
            let html='';
            day.exercises.forEach((ex,ei)=>{
                const keyPrefix=`${db.currentDayId}_${ei}`;
                const allDone=ex.sets.every((s,si)=>db.progress[`${keyPrefix}_${si}`]);
                const expanded=db.expanded[ei]!==undefined?db.expanded[ei]:!allDone;
                html+=`<div class="card ${expanded?'open':''}" id="ex-card-${ei}">
                    <div class="card-header" onclick="toggleExercise(${ei})">
                        <span class="card-title">${ex.name||'Упражнение '+(ei+1)}</span>
                        <span class="card-arrow">▾</span>
                    </div>
                    <div class="card-body"><div class="sets-grid">`;
                ex.sets.forEach((s,si)=>{
                    const done=db.progress[`${keyPrefix}_${si}`];
                    html+=`<button class="set-btn ${done?'done':''}" onclick="toggleSet(${ei},${si},${s.rest})">
                        <span class="set-reps">${s.reps}</span>
                        <span class="set-weight">${s.weight>0?s.weight+'кг':'раз'}</span>
                        ${done?'<span class="check-mark">✓</span>':''}
                    </button>`;
                });
                html+=`</div></div></div>`;
            });
            html+=`<div class="footer-actions"><button class="btn btn-success" onclick="finishWorkout()">${db.completedDays[db.currentDayId]?'Следующий день →':'Завершить день'}</button><button class="btn btn-secondary" onclick="restartDay()">↺ Заново</button></div>`;
            view.innerHTML=html;
        }
        function toggleExercise(ei){
            db.expanded[ei]=!db.expanded[ei];
            saveDB();renderWorkout();
        }
        function toggleSet(ei,si,rest){
            const key=`${db.currentDayId}_${ei}_${si}`;
            if(db.progress[key]){delete db.progress[key];}else{db.progress[key]=true;if(rest>0)startTimer(rest*60);}
            saveDB();renderWorkout();
        }
        function finishWorkout(){
            const day=db.days[db.currentDayId];
            const allDone=day.exercises.every((ex,ei)=>ex.sets.every((s,si)=>db.progress[`${db.currentDayId}_${ei}_${si}`]));
            if(!allDone){alert('Выполните все подходы перед завершением.');return;}
            db.completedDays[db.currentDayId]=true;
            db.history.push({date:new Date().toISOString(),dayIndex:db.currentDayId,dayName:day.name});
            if(db.days.length>1)db.currentDayId=(db.currentDayId+1)%db.days.length;
            saveDB();renderAll();
        }
        function restartDay(){
            if(confirm('Сбросить прогресс этого дня?')){
                db.completedDays[db.currentDayId]=false;
                Object.keys(db.progress).forEach(k=>{if(k.startsWith(db.currentDayId+'_'))delete db.progress[k];});
                saveDB();renderAll();
            }
        }
        function renderSetup(){
            const view=document.getElementById('view-setup');
            const day=db.days[db.currentDayId];
            if(!day){
                view.innerHTML=`<button class="btn btn-primary" onclick="addDay()">+ Новый день</button>`;
                return;
            }
            let html=`<div style="display:flex;justify-content:space-between;margin-bottom:10px;"><button class="icon-btn icon-btn-accent" onclick="copyDay()">Копировать</button><button class="icon-btn icon-btn-accent" onclick="addDay()">+ День</button></div>
            <input id="day-name-input" value="${day.name}" onchange="updateDayName(this.value)" style="font-size:20px;font-weight:700;background:transparent;padding:0;margin-bottom:10px;">`;
            day.exercises.forEach((ex,ei)=>{
                html+=`<div class="card"><div style="display:flex;gap:6px;margin-bottom:6px;"><input value="${ex.name}" onchange="updateExName(${ei},this.value)" placeholder="Название"><button class="icon-btn" onclick="deleteExercise(${ei})">${trashIcon}</button></div>
                <div class="setup-row-labels"><div>№</div><div>Повт</div><div>Вес</div><div>Мин</div><div></div></div>`;
                ex.sets.forEach((s,si)=>{
                    html+=`<div class="setup-row"><div style="text-align:center;font-weight:700;">${si+1}</div>
                    <input value="${s.reps}" onchange="updateSet(${ei},${si},'reps',this.value)" style="text-align:center;">
                    <input type="number" value="${s.weight}" onchange="updateSet(${ei},${si},'weight',this.value)" style="text-align:center;">
                    <input type="number" step="0.5" value="${s.rest}" onchange="updateSet(${ei},${si},'rest',this.value)" style="text-align:center;">
                    <button class="icon-btn" onclick="deleteSet(${ei},${si})">${trashIcon}</button></div>`;
                });
                html+=`<button class="btn btn-secondary btn-small" onclick="addSet(${ei})">+ Подход</button></div>`;
            });
            html+=`<button class="btn btn-secondary" onclick="addExercise()">+ Упражнение</button>
            <button class="btn btn-danger" onclick="deleteCurrentDay()">Удалить день</button>`;
            view.innerHTML=html;
        }
        function updateDayName(v){db.days[db.currentDayId].name=v||'Без названия';saveDB();renderDaysNav();}
        function updateExName(ei,v){db.days[db.currentDayId].exercises[ei].name=v;saveDB();}
        function updateSet(ei,si,f,v){db.days[db.currentDayId].exercises[ei].sets[si][f]=f==='reps'?v:(parseFloat(v)||0);saveDB();}
        function addExercise(){
            const def=db.settings;
            db.days[db.currentDayId].exercises.push({name:'',sets:[{reps:def.defaultReps,weight:def.defaultWeight,rest:def.defaultRest}]});
            saveDB();renderSetup();
        }
        function deleteExercise(ei){if(confirm('Удалить?')){db.days[db.currentDayId].exercises.splice(ei,1);saveDB();renderSetup();}}
        function addSet(ei){
            const ex=db.days[db.currentDayId].exercises[ei];
            const last=ex.sets.length?{...ex.sets[ex.sets.length-1]}:{reps:db.settings.defaultReps,weight:db.settings.defaultWeight,rest:db.settings.defaultRest};
            ex.sets.push(last);saveDB();renderSetup();
        }
        function deleteSet(ei,si){db.days[db.currentDayId].exercises[ei].sets.splice(si,1);saveDB();renderSetup();}
        function addDay(){db.days.push({name:`День ${db.days.length+1}`,exercises:[]});db.currentDayId=db.days.length-1;saveDB();renderAll();}
        function deleteCurrentDay(){if(confirm('Удалить день?')){db.days.splice(db.currentDayId,1);delete db.completedDays[db.currentDayId];db.currentDayId=db.days.length?0:0;saveDB();renderAll();}}
        function copyDay(){
            if(!db.days.length)return;
            const c=JSON.parse(JSON.stringify(db.days[db.currentDayId]));c.name+=' (копия)';db.days.push(c);
            db.currentDayId=db.days.length-1;saveDB();renderAll();
        }
        function renderSettings(){
            const view=document.getElementById('view-settings');
            view.innerHTML=`
            <div class="card"><div style="display:flex;justify-content:space-between;align-items:center;"><strong>Тёмная тема</strong><input type="checkbox" id="theme-toggle" onchange="toggleTheme()" style="width:22px;height:22px;" ${db.theme==='dark'?'checked':''}></div></div>
            <div class="card"><h4 style="margin:0 0 8px;">Умолчания подхода</h4>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
                <div><label style="font-size:12px;color:var(--muted);">Повт</label><input id="def-reps" value="${db.settings.defaultReps}" onchange="updateSetting('defaultReps',this.value)"></div>
                <div><label style="font-size:12px;color:var(--muted);">Вес</label><input type="number" id="def-weight" value="${db.settings.defaultWeight}" onchange="updateSetting('defaultWeight',this.value)"></div>
                <div><label style="font-size:12px;color:var(--muted);">Мин</label><input type="number" step="0.5" id="def-rest" value="${db.settings.defaultRest}" onchange="updateSetting('defaultRest',this.value)"></div>
            </div></div>
            <div class="card"><h4 style="margin:0 0 6px;">История</h4>${db.history.length?db.history.slice(-5).reverse().map(h=>`<div style="font-size:13px;margin-bottom:4px;display:flex;justify-content:space-between;"><span>${h.dayName}</span><span>${new Date(h.date).toLocaleDateString()}</span></div>`).join(''):'<p style="color:var(--muted);">Нет завершённых тренировок</p>'}</div>
            <button class="btn btn-danger" onclick="hardReset()">Сбросить всё</button>`;
            document.getElementById('theme-toggle').checked=db.theme==='dark';
        }
        function updateSetting(key,val){
            if(key==='defaultWeight'||key==='defaultRest')val=parseFloat(val)||0;
            db.settings[key]=val;saveDB();
        }
        function startTimer(sec){
            stopTimer();timerSeconds=sec;
            const panel=document.getElementById('timer-panel'),disp=document.getElementById('timer-display');
            panel.classList.add('active');updateTimerDisplay();
            timerInterval=setInterval(()=>{
                timerSeconds--;updateTimerDisplay();
                if(timerSeconds<=0){stopTimer();playBeep();if(navigator.vibrate)navigator.vibrate([400,600,400,600,400]);}
            },1000);
        }
        function updateTimerDisplay(){
            const m=Math.floor(timerSeconds/60),s=timerSeconds%60;
            document.getElementById('timer-display').innerText=`${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
        }
        function adjustTimer(delta){
            timerSeconds=Math.max(0,timerSeconds+delta);
            updateTimerDisplay();
        }
        function stopTimer(){clearInterval(timerInterval);document.getElementById('timer-panel').classList.remove('active');}
        function toggleTheme(){
            const is=document.getElementById('theme-toggle').checked;
            db.theme=is?'dark':'light';
            document.body.setAttribute('data-theme',is?'dark':'');
            saveDB();
        }
        function hardReset(){if(confirm('Точно сбросить всё?')){localStorage.removeItem(STORAGE_KEY);location.reload();}}
        let touchStartX=0;
        document.addEventListener('touchstart',e=>{if(e.target.closest('.days-scroll,.card-header,button,input'))return;touchStartX=e.touches[0].clientX;});
        document.addEventListener('touchend',e=>{
            if(!touchStartX)return;
            const diff=e.changedTouches[0].clientX-touchStartX;
            if(Math.abs(diff)>50&&activeTab==='workout'&&db.days.length>1){
                if(diff>0)db.currentDayId=(db.currentDayId-1+db.days.length)%db.days.length;
                else db.currentDayId=(db.currentDayId+1)%db.days.length;
                saveDB();renderAll();
            }
            touchStartX=0;
        });
        init();
    </script>
